<div class="flex mt-32 gap-6">
  <div class="w-3/4">
    <mat-stepper
      (selectionChange)="onStepChange($event)"
      [linear]="true"
      #stepper
      class="bg-white border border-gray-200 shadow-sm"
    >
      <mat-step label="Adresă" [completed]="completionStatus().address">
        <div id="address-element"></div>
        <div class="flex justify-end mt-1">
          <mat-checkbox [checked]="saveAddress" (change)="onSaveAddressCheckboxChange($event)"
            >Salvează ca adresă implicită</mat-checkbox
          >
        </div>
        <div class="flex justify-between mt-6">
          <button class="z-0" routerLink="/shop" mat-stroked-button>Continuă cumpărăturile</button>
          <button
            [disabled]="!completionStatus().address"
            class="z-0"
            matStepperNext
            mat-flat-button
          >
            Înainte
          </button>
        </div>
      </mat-step>
      <mat-step label="Livrare" [completed]="completionStatus().delivery">
        <app-checkout-delivery
          (deliveryComplete)="handleDeliveryChange($event)"
        ></app-checkout-delivery>
        <div class="flex justify-between mt-6">
          <button matStepperPrevious mat-stroked-button>Înapoi</button>
          <button [disabled]="!completionStatus().delivery" matStepperNext mat-flat-button>
            Înainte
          </button>
        </div>
      </mat-step>
      <mat-step label="Plată" [completed]="completionStatus().card">
        <div id="payment-element"></div>
        <div class="flex justify-between mt-6">
          <button matStepperPrevious mat-stroked-button>Înapoi</button>
          <button [disabled]="!completionStatus().card" matStepperNext mat-flat-button>Înainte</button>
        </div>
      </mat-step>
      <mat-step label="Confirmare">
        <app-checkout-review [confirmationToken]="confirmationToken"></app-checkout-review>
        <div class="flex justify-between mt-6">
          <button class="z-0" matStepperPrevious mat-stroked-button>Înapoi</button>
          <button
            [disabled]="!confirmationToken || loading"
            (click)="confirmPayment(stepper)"
            class="z-0"
            mat-flat-button
          >
            @if (loading) {
              <mat-spinner diameter="20"></mat-spinner>
            } @else {
              <span>Plătește {{ cartService.totals()?.total | currency }}</span>
            }
          </button>
        </div>
      </mat-step>
    </mat-stepper>
  </div>
  <div class="w-1/4">
    <app-order-summary></app-order-summary>
  </div>
</div>
