<header class="h-20 w-full fixed top-0 bg-[#0D2B52] z-50 shadow-lg">
  <div class="flex items-center justify-between max-w-screen-2xl mx-auto h-full px-6">

    <img routerLink="/" src="/images/logo.png" alt="SkiMag" class="h-12 cursor-pointer" />

    <nav class="flex gap-8 items-center">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Home</a>
      <a routerLink="/shop" routerLinkActive="active" class="nav-link">Shop</a>
      <a routerLink="/test-error" routerLinkActive="active" class="nav-link">Errors</a>
      <a *appIsAdmin routerLink="/admin" routerLinkActive="active" class="nav-link">Admin</a>
    </nav>

    <div class="flex items-center gap-4">
      <a
        routerLink="/cart"
        routerLinkActive="active"
        matBadge="{{ cartService.itemCount() }}"
        matBadgeSize="large"
        class="custom-badge text-white/80 hover:text-white transition-colors"
      >
        <mat-icon>shopping_cart</mat-icon>
      </a>

      @if (accountService.currentUser()) {
        <button mat-button [matMenuTriggerFor]="menu" class="text-white/80! hover:text-white!">
          <mat-icon>person</mat-icon>
          <span class="text-sm max-w-32 truncate">{{ accountService.currentUser()?.email }}</span>
          <mat-icon>arrow_drop_down</mat-icon>
        </button>
      } @else {
        <button routerLink="/account/login" mat-stroked-button class="text-white! border-white/50! hover:border-white!">Login</button>
        <button routerLink="/account/register" mat-flat-button class="bg-[#FF6B00]! text-white! hover:bg-[#e56000]!">Register</button>
      }
    </div>
  </div>
</header>

@if (busyService.loading) {
  <mat-progress-bar class="fixed top-20 z-50" mode="indeterminate"></mat-progress-bar>
}

<mat-menu #menu="matMenu">
  <button mat-menu-item routerLink="/cart">
    <mat-icon>shopping_cart</mat-icon>
    My cart
  </button>
  <button mat-menu-item routerLink="/orders">
    <mat-icon>history</mat-icon>
    My orders
  </button>
  <mat-divider></mat-divider>
  <button mat-menu-item (click)="logout()">
    <mat-icon>logout</mat-icon>
    Logout
  </button>
</mat-menu>
